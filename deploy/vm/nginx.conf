server {
    listen 80;
    server_name _;

    location /telegram/webhook {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Reject all other paths
    location / {
        return 404;
    }
}
