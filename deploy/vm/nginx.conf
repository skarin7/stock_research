# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS with self-signed cert (Telegram accepts it when cert is passed to setWebhook)
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/ssl/certs/telegram-webhook.crt;
    ssl_certificate_key /etc/ssl/private/telegram-webhook.key;

    location /telegram/webhook {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location / {
        return 404;
    }
}
